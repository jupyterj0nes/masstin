name: Windows VS 2026 smoke test

# One-off manual workflow to check that masstin still builds cleanly on
# the upcoming windows-latest image (VS 2026), which GitHub will roll
# out between 2026-06-08 and 2026-06-15. Run it once from the Actions
# UI before that window; delete this file once it passes (or escalate
# if it fails).

on:
  workflow_dispatch:

jobs:
  build:
    name: cargo build on windows-2025-vs2026
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain context
        shell: pwsh
        run: |
          rustc --version
          cargo --version
          # Try to surface the Visual Studio version cc::Build will pick
          # so a future failure is easier to triage.
          (Get-Command cl.exe -ErrorAction SilentlyContinue) | ForEach-Object {
            Write-Host "cl.exe at: $($_.Source)"
          }
          if (Test-Path 'C:\Program Files\Microsoft Visual Studio') {
            Get-ChildItem 'C:\Program Files\Microsoft Visual Studio' -Directory |
              Select-Object Name
          }

      - name: cargo build --release
        run: cargo build --release

      - name: Sanity check the produced binary
        shell: pwsh
        run: |
          $exe = 'target/release/masstin.exe'
          if (-not (Test-Path $exe)) {
            Write-Error "Binary not found at $exe"
            exit 1
          }
          & $exe --version
