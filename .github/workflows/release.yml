name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: masstin.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: masstin
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: masstin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly — required by the opt-in nightly-oom-hook feature)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build with nightly-oom-hook feature enabled
        # The released binaries enable `nightly-oom-hook` so EVTX carving
        # can catch BinXML-triggered OOM aborts from the evtx crate and
        # continue processing the rest of the image. End users run a
        # normal executable — they never interact with Rust or nightly.
        # Contributors building from source on stable can use plain
        # `cargo build` without the feature; everything still works,
        # only the carving OOM protection becomes a no-op.
        run: cargo build --release --target ${{ matrix.target }} --features nightly-oom-hook

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/masstin.exe masstin-${{ github.ref_name }}-windows.exe

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp target/${{ matrix.target }}/release/masstin masstin-${{ github.ref_name }}-linux
          chmod +x masstin-${{ github.ref_name }}-linux

      - name: Rename binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp target/${{ matrix.target }}/release/masstin masstin-${{ github.ref_name }}-macos
          chmod +x masstin-${{ github.ref_name }}-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: masstin-${{ matrix.os }}
          path: masstin-${{ github.ref_name }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: masstin-*
