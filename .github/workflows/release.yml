name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: masstin.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: masstin
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: masstin
            mac_arch: x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: masstin
            mac_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/masstin.exe masstin-${{ github.ref_name }}-windows.exe

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp target/${{ matrix.target }}/release/masstin masstin-${{ github.ref_name }}-linux
          chmod +x masstin-${{ github.ref_name }}-linux

      - name: Rename binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          cp target/${{ matrix.target }}/release/masstin masstin-${{ github.ref_name }}-macos-${{ matrix.mac_arch }}
          chmod +x masstin-${{ github.ref_name }}-macos-${{ matrix.mac_arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: masstin-${{ matrix.target }}
          path: masstin-${{ github.ref_name }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: masstin-*
